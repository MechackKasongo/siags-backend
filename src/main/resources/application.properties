spring.application.name=siags-backend
spring.jpa.open-in-view=false
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/siags_db
spring.datasource.username=siags_user
spring.datasource.password=VOTRE_MOT_DE_PASSE_SECURISE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
hgs.app.jwtSecret=SuperSecretKeyForYourTFCProjectThatIsAtLeast256BitsLongAndShouldBeChangedForProduction!
hgs.app.jwtExpirationMs=86400000
# Logging Configuration
odoo.url=http://localhost:8069
odoo.database=siags_db
odoo.username=adminodoo@example.com
odoo.password=admin
# File Upload Configuration
# Ensure the upload directory exists and is writable by the application
file.upload-dir=./uploads