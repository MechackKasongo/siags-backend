spring.application.name=siags-backend
# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/siags_db
spring.datasource.username=siags_user
spring.datasource.password=VOTRE_MOT_DE_PASSE_SECURISE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
hgs.app.jwtSecret=SuperSecretKeyForYourTFCProjectThatIsAtLeast256BitsLongAndShouldBeChangedForProduction!
hgs.app.jwtExpirationMs=86400000
# Configuration Odoo
# Odoo Configuration
# Assurez-vous que ces paramčtres correspondent ŕ votre instance Odoo
# Odoo Configuration
# L'URL de votre instance Odoo
# Le nom de la base de données que vous avez créée dans Odoo (ex: siags_db)
# L'email de l'utilisateur Odoo que vous avez créé (ex: admin@example.com)
# Le mot de passe de cet utilisateur Odoo (ex: admin)
odoo.url=http://localhost:8069
odoo.database=siags_db
odoo.username=adminodoo@example.com
odoo.password=admin